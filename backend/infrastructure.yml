AWSTemplateFormatVersion: '2010-09-09'
Description: GitSight Developer Analytics Infrastructure

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

Resources:
  # SQS Queue
  AnalyticsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub gitsight-analytics-${Environment}
      VisibilityTimeout: 300
      MessageRetentionPeriod: 1209600

  # DynamoDB Tables
  MetricsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub GitSightMetrics-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: username
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: username
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  IncidentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub GitSightIncidents-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  LogsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub GitSightLogs-${Environment}
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # Lambda Execution Role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt AnalyticsQueue.Arn
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:*
              - Effect: Allow
                Action:
                  - dynamodb:Scan
                  - dynamodb:Query
                  - dynamodb:PutItem
                Resource: 
                  - !GetAtt MetricsTable.Arn
                  - !GetAtt IncidentsTable.Arn
                  - !GetAtt LogsTable.Arn
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                Resource: '*'

  # API Gateway
  ApiGateway:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub gitsight-api-${Environment}
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - POST
          - GET
          - OPTIONS
        AllowHeaders:
          - Content-Type

  # Integrations
  ApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiHandlerFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  MetricsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${MetricsFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  LeaderboardIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LeaderboardFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  IncidentsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${IncidentsFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  LogsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LogsFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  ChaosIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ChaosFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  ArchitectureIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ArchitectureFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  PipelineIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref ApiGateway
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${PipelineFunction.Arn}/invocations
      PayloadFormatVersion: '2.0'

  # Routes
  AnalyzeRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/analyze'
      Target: !Sub integrations/${ApiIntegration}

  MetricsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/metrics/system'
      Target: !Sub integrations/${MetricsIntegration}

  LeaderboardRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/developers/top'
      Target: !Sub integrations/${LeaderboardIntegration}

  IncidentsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/incidents'
      Target: !Sub integrations/${IncidentsIntegration}

  LogsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/logs'
      Target: !Sub integrations/${LogsIntegration}

  ChaosWorkerRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/chaos/worker-failure'
      Target: !Sub integrations/${ChaosIntegration}

  ChaosApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'POST /api/chaos/api-failure'
      Target: !Sub integrations/${ChaosIntegration}

  ArchitectureRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/architecture/status'
      Target: !Sub integrations/${ArchitectureIntegration}

  SystemComponentsRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /api/system-components'
      Target: !Sub integrations/${ArchitectureIntegration}

  PipelineRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref ApiGateway
      RouteKey: 'GET /pipeline/status'
      Target: !Sub integrations/${PipelineIntegration}

  # API Gateway Stage
  ApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref ApiGateway
      StageName: '$default'
      AutoDeploy: true

  # Lambda Permissions
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiHandlerFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  MetricsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  LeaderboardInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LeaderboardFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  IncidentsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref IncidentsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  LogsInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LogsFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  ChaosInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ChaosFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  ArchitectureInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ArchitectureFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  PipelineInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref PipelineFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${ApiGateway}/*/*

  # Lambda Functions
  ApiHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gitsight-api-handler-${Environment}
      Runtime: nodejs18.x
      Handler: api-handler.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/api-handler.js' }) };
          };
      Environment:
        Variables:
          LAMBDA_COLLECTOR_NAME: !Ref CollectorFunction
      Timeout: 30

  CollectorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub github-collector-${Environment}
      Runtime: nodejs18.x
      Handler: collector.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/collector.js' }) };
          };
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref AnalyticsQueue
          DYNAMODB_TABLE: !Ref MetricsTable
      Timeout: 60

  MetricsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gitsight-metrics-${Environment}
      Runtime: nodejs18.x
      Handler: metrics.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/metrics.js' }) };
          };
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref AnalyticsQueue
      Timeout: 10

  LeaderboardFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gitsight-leaderboard-${Environment}
      Runtime: nodejs18.x
      Handler: leaderboard.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/leaderboard.js' }) };
          };
      Environment:
        Variables:
          DYNAMODB_TABLE: !Ref MetricsTable
      Timeout: 10

  IncidentsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gitsight-incidents-${Environment}
      Runtime: nodejs18.x
      Handler: incidents.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/incidents.js' }) };
          };
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref AnalyticsQueue
      Timeout: 10

  LogsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gitsight-logs-${Environment}
      Runtime: nodejs18.x
      Handler: logs.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/logs.js' }) };
          };
      Environment:
        Variables:
          DYNAMODB_TABLE: !Sub GitSightLogs-${Environment}
      Timeout: 10

  ChaosFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gitsight-chaos-${Environment}
      Runtime: nodejs18.x
      Handler: chaos.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/chaos.js' }) };
          };
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref AnalyticsQueue
      Timeout: 10

  ArchitectureFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gitsight-architecture-${Environment}
      Runtime: nodejs18.x
      Handler: architecture.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/architecture.js' }) };
          };
      Environment:
        Variables:
          SQS_QUEUE_URL: !Ref AnalyticsQueue
          DYNAMODB_TABLE: !Ref MetricsTable
          LAMBDA_COLLECTOR_NAME: !Ref CollectorFunction
      Timeout: 10

  PipelineFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub gitsight-pipeline-${Environment}
      Runtime: nodejs18.x
      Handler: pipeline.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          exports.handler = async (event) => {
            return { statusCode: 200, body: JSON.stringify({ message: 'Deploy from backend/lambda/pipeline.js' }) };
          };
      Environment:
        Variables:
          GITHUB_OWNER: gitsight
          GITHUB_REPO: GitSight
      Timeout: 15

  # Worker Task Role
  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: WorkerPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt AnalyticsQueue.Arn
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:GetItem
                Resource: !GetAtt MetricsTable.Arn

Outputs:
  ApiEndpoint:
    Value: !GetAtt ApiGateway.ApiEndpoint
    Export:
      Name: !Sub ${AWS::StackName}-ApiEndpoint
  
  QueueURL:
    Value: !Ref AnalyticsQueue
    Export:
      Name: !Sub ${AWS::StackName}-QueueURL
  
  MetricsTableName:
    Value: !Ref MetricsTable
    Export:
      Name: !Sub ${AWS::StackName}-MetricsTable

  IncidentsTableName:
    Value: !Ref IncidentsTable
    Export:
      Name: !Sub ${AWS::StackName}-IncidentsTable

  LogsTableName:
    Value: !Ref LogsTable
    Export:
      Name: !Sub ${AWS::StackName}-LogsTable
